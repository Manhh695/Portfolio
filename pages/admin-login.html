<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Pham Duc Manh Portfolio</title>
  <meta name="robots" content="noindex, nofollow">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;900&display=swap"
    rel="stylesheet">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <!-- Tailwind CSS Output -->
  <link rel="stylesheet" href="../css/tailwind-output.css">
  <!-- Base CSS -->
  <link rel="stylesheet" href="../css/style.css">
  <!-- Admin Login specific CSS -->
  <link rel="stylesheet" href="../css/admin-login.css">
</head>

<body>
  <!-- Animated background blobs -->
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>
  <div class="bg-blob bg-blob-3"></div>

  <div class="login-container">
    <div class="login-card">

      <!-- Brand -->
      <div class="login-brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
        </div>
        <div class="brand-text">
          CMS Dashboard
          <span>Pham Duc Manh · Portfolio</span>
        </div>
      </div>

      <!-- Title -->
      <h1 class="login-title">Welcome back</h1>
      <p class="login-subtitle">Enter your admin password to continue</p>

      <!-- Form -->
      <form id="login-form" autocomplete="off">
        <div class="form-group">
          <label for="admin-password">Admin Password</label>
          <div class="input-wrapper">
            <input type="password" id="admin-password" name="admin-password" placeholder="Enter password..."
              autocomplete="current-password" required>
            <button type="button" class="toggle-password" id="toggle-pwd" aria-label="Show/hide password">
              <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>

        <div class="error-msg" id="error-msg">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          <span id="error-text">Incorrect password. Please try again.</span>
        </div>

        <button type="submit" class="btn-login" id="login-btn">
          <div class="spinner"></div>
          <span class="btn-label">Access Dashboard</span>
        </button>
      </form>

      <!-- Success flash (shown briefly before redirect) -->
      <div class="success-flash" id="success-flash">
        <div class="success-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
            stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <p>Access granted. Redirecting...</p>
      </div>

      <!-- Footer -->
      <div class="login-footer">
        <a href="../index.html">← Back to Portfolio</a>
      </div>
    </div>
  </div>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmTi8eFa2M/aFyHmwS/PQFZ3EXQ" crossorigin="anonymous"></script>
  <script>
    // =============================================
    // ADMIN AUTH SYSTEM
    // Uses SHA-256 hashing via Web Crypto API
    // Default password: admin@2025 (change in admin.html Settings)
    // =============================================

    const DEFAULT_PASSWORD = 'admin@2025';
    const SESSION_KEY = 'portfolio_admin_session';
    const PWD_HASH_KEY = 'portfolio_admin_pwd_hash';

    // If already logged in, skip to dashboard
    if (sessionStorage.getItem(SESSION_KEY) === 'authenticated') {
      window.location.replace('admin.html');
    }

    async function sha256(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function getStoredHash() {
      const stored = localStorage.getItem(PWD_HASH_KEY);
      if (stored) return stored;
      // First-run: hash the default password and store it
      const hash = await sha256(DEFAULT_PASSWORD);
      localStorage.setItem(PWD_HASH_KEY, hash);
      return hash;
    }

    // Toggle password visibility
    const pwdInput = document.getElementById('admin-password');
    const toggleBtn = document.getElementById('toggle-pwd');
    const eyeIcon = document.getElementById('eye-icon');

    toggleBtn.addEventListener('click', () => {
      const isHidden = pwdInput.type === 'password';
      pwdInput.type = isHidden ? 'text' : 'password';
      eyeIcon.innerHTML = isHidden
        ? `<line x1="1" y1="1" x2="23" y2="23"></line>
           <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path>
           <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path>`
        : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>`;
    });

    // Login form submit
    const form = document.getElementById('login-form');
    const loginBtn = document.getElementById('login-btn');
    const errorMsg = document.getElementById('error-msg');
    const errorText = document.getElementById('error-text');
    const successFlash = document.getElementById('success-flash');

    // Track failed attempts for cooldown
    let failedAttempts = parseInt(sessionStorage.getItem('login_attempts') || '0');
    let cooldownUntil = parseInt(sessionStorage.getItem('login_cooldown') || '0');

    function showError(msg) {
      errorText.textContent = msg;
      errorMsg.classList.remove('visible');
      // force reflow to restart animation
      void errorMsg.offsetWidth;
      errorMsg.classList.add('visible');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      // Cooldown check
      const now = Date.now();
      if (now < cooldownUntil) {
        const secs = Math.ceil((cooldownUntil - now) / 1000);
        showError(`Too many attempts. Try again in ${secs}s.`);
        return;
      }

      const password = pwdInput.value;
      if (!password) return;

      // Loading state
      loginBtn.disabled = true;
      loginBtn.classList.add('loading');
      errorMsg.classList.remove('visible');

      try {
        const [inputHash, storedHash] = await Promise.all([sha256(password), getStoredHash()]);

        if (inputHash === storedHash) {
          // Success
          failedAttempts = 0;
          sessionStorage.removeItem('login_attempts');
          sessionStorage.removeItem('login_cooldown');
          sessionStorage.setItem(SESSION_KEY, 'authenticated');

          // Show success flash
          form.style.display = 'none';
          successFlash.classList.add('visible');

          // Redirect after short delay
          setTimeout(() => {
            window.location.replace('admin.html');
          }, 900);
        } else {
          // Failed
          failedAttempts++;
          sessionStorage.setItem('login_attempts', failedAttempts);

          if (failedAttempts >= 5) {
            const lockoutMs = Math.min(failedAttempts * 15000, 120000); // 15s per attempt, max 2min
            cooldownUntil = Date.now() + lockoutMs;
            sessionStorage.setItem('login_cooldown', cooldownUntil);
            showError(`Too many failed attempts. Locked for ${Math.ceil(lockoutMs / 1000)}s.`);
          } else {
            const remaining = 5 - failedAttempts;
            showError(`Incorrect password. ${remaining} attempt${remaining !== 1 ? 's' : ''} remaining.`);
          }

          pwdInput.value = '';
          pwdInput.focus();
          loginBtn.disabled = false;
          loginBtn.classList.remove('loading');
        }
      } catch (err) {
        showError('Authentication error. Please try again.');
        loginBtn.disabled = false;
        loginBtn.classList.remove('loading');
      }
    });

    // Auto-focus password field
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => pwdInput.focus(), 400);
    });
  </script>
</body>

</html>
